regexes = [
  '''2da392a6-79d2-4304-a8b7-959572c7e44d''',
  '''sua-chave-sandbox-aqui''',
  '''sua-chave-producao-aqui''',
  '''chave-prod''',
  '''chave-producao''',
  '''SEU_PAT''',
  '''SEU_PERSONAL_ACCESS_TOKEN''',
  '''SEU_USUARIO_GITHUB''',
