# DEPRECATED — use .github/workflows/ci.yml (build, test, pack, publish GitHub Packages).
# Mantido apenas para validação rápida em Azure DevOps, se necessário.
trigger: none

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: UseDotNet@2
    inputs:
      packageType: 'sdk'
      version: '10.0.x'

  - script: dotnet build ERP.Fiscal.slnx --configuration Release
    displayName: 'Build'

  - script: dotnet test ERP.Fiscal.slnx --configuration Release --logger trx --results-directory $(Agent.TempDirectory)/TestResults
    displayName: 'Test'

  - task: PublishTestResults@2
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'VSTest'
      testResultsFiles: '**/*.trx'
      searchFolder: '$(Agent.TempDirectory)/TestResults'
