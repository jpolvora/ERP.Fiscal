name: Validate PR

on:
  pull_request:
    branches:
      - main

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  validate:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ERP.Fiscal.slnx

      - name: Build
        run: dotnet build ERP.Fiscal.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ERP.Fiscal.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-pr-${{ github.event.pull_request.number }}
          path: '**/test-results.trx'
          if-no-files-found: ignore

      - name: Pack for smoke test
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(bash scripts/ci-package-version.sh resolve)-pr.${{ github.event.pull_request.number }}"
          echo "SMOKE_PACKAGE_VERSION=${VERSION}" >> "${GITHUB_ENV}"
          dotnet pack ERP.Fiscal.slnx \
            --configuration Release \
            --no-build \
            --output "${RUNNER_TEMP}/packages" \
            -p:PackageVersion="${VERSION}" \
            -p:ContinuousIntegrationBuild=true

      - name: Run package smoke test
        shell: bash
        working-directory: samples/ERP.Fiscal.PackageSmokeTest
        run: |
          set -euo pipefail
          CONFIG="${RUNNER_TEMP}/smoke-nuget.config"
          cat > "${CONFIG}" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="local-ci" value="${RUNNER_TEMP}/packages" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
            <packageSourceMapping>
              <packageSource key="local-ci">
                <package pattern="ERP.Fiscal.*" />
              </packageSource>
              <packageSource key="nuget.org">
                <package pattern="*" />
              </packageSource>
            </packageSourceMapping>
          </configuration>
          EOF
          export NUGET_PACKAGES="${RUNNER_TEMP}/global-packages"
          dotnet test --configuration Release \
            --configfile "${CONFIG}" \
            -p:ErpFiscalPackageVersion="${SMOKE_PACKAGE_VERSION}"
