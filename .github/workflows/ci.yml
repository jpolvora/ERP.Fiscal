name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  GITHUB_PACKAGES_SOURCE: https://nuget.pkg.github.com/jpolvora/index.json

jobs:
  # PR → main: build, testes unitários, pack local e smoke test (sem publicar).
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ERP.Fiscal.slnx

      - name: Build
        run: dotnet build ERP.Fiscal.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ERP.Fiscal.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-pr-${{ github.event.pull_request.number }}
          path: '**/test-results.trx'
          if-no-files-found: ignore

      - name: Pack for smoke test
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(bash scripts/ci-package-version.sh resolve)-pr.${{ github.event.pull_request.number }}"
          echo "SMOKE_PACKAGE_VERSION=${VERSION}" >> "${GITHUB_ENV}"
          dotnet pack ERP.Fiscal.slnx \
            --configuration Release \
            --no-build \
            --output "${RUNNER_TEMP}/packages" \
            -p:PackageVersion="${VERSION}" \
            -p:ContinuousIntegrationBuild=true

      - name: Run package smoke test
        shell: bash
        working-directory: samples/ERP.Fiscal.PackageSmokeTest
        run: |
          set -euo pipefail
          CONFIG="${RUNNER_TEMP}/smoke-nuget.config"
          cat > "${CONFIG}" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="local-ci" value="${RUNNER_TEMP}/packages" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
            <packageSourceMapping>
              <packageSource key="local-ci">
                <package pattern="ERP.Fiscal.*" />
              </packageSource>
              <packageSource key="nuget.org">
                <package pattern="*" />
              </packageSource>
            </packageSourceMapping>
          </configuration>
          EOF
          dotnet test --configuration Release \
            --configfile "${CONFIG}" \
            -p:ErpFiscalPackageVersion="${SMOKE_PACKAGE_VERSION}"

  # push main / tag v*: build, pack, publish e bump (apenas main).
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    outputs:
      package_version: ${{ steps.version.outputs.package_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "package_version=${VERSION}" >> "${GITHUB_OUTPUT}"
            echo "should_bump=false" >> "${GITHUB_OUTPUT}"
          else
            VERSION="$(bash scripts/ci-package-version.sh resolve)"
            echo "package_version=${VERSION}" >> "${GITHUB_OUTPUT}"
            if [[ "${GITHUB_REF}" == "refs/heads/main" ]] && [[ "${{ contains(github.event.head_commit.message, '[skip ci]') }}" != "true" ]]; then
              echo "should_bump=true" >> "${GITHUB_OUTPUT}"
            else
              echo "should_bump=false" >> "${GITHUB_OUTPUT}"
            fi
          fi
          echo "Resolved package version: ${VERSION}"

      - name: Restore
        run: dotnet restore ERP.Fiscal.slnx

      - name: Build
        run: dotnet build ERP.Fiscal.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ERP.Fiscal.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Pack
        run: >
          dotnet pack ERP.Fiscal.slnx
          --configuration Release
          --no-build
          --output "${{ runner.temp }}/packages"
          -p:PackageVersion=${{ steps.version.outputs.package_version }}
          -p:ContinuousIntegrationBuild=true

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.package_version }}
          path: |
            ${{ runner.temp }}/packages/*.nupkg
            ${{ runner.temp }}/packages/*.snupkg
          if-no-files-found: error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'
          if-no-files-found: ignore

      - name: Publish to GitHub Packages
        run: >
          dotnet nuget push "${{ runner.temp }}/packages/*.nupkg"
          --source "${{ env.GITHUB_PACKAGES_SOURCE }}"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --skip-duplicate

      - name: Publish symbols to GitHub Packages
        run: >
          dotnet nuget push "${{ runner.temp }}/packages/*.snupkg"
          --source "${{ env.GITHUB_PACKAGES_SOURCE }}"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --skip-duplicate

      - name: Publish to NuGet.org
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          dotnet nuget push "${{ runner.temp }}/packages/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Bump package version for next merge
        if: github.ref == 'refs/heads/main' && steps.version.outputs.should_bump == 'true'
        shell: bash
        run: |
          set -euo pipefail
          NEXT="$(bash scripts/ci-package-version.sh bump)"
          PREFIX="$(sed -n 's|^[[:space:]]*<VersionPrefix>\(.*\)</VersionPrefix>|\1|p' nuget.props | head -n1)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nuget.props
          git commit -m "chore: bump package version to ${PREFIX}.${NEXT} [skip ci]"
          git push origin HEAD:main
